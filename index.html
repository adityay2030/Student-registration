<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

     <style>
        body {
            font-family: Arial, sans-serif;
            background: url('background2.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .header {
            text-align: center;
            color: white;
        }

        .header img {
            width: 200px;
        }

        .container {
            max-width: 750px;
            margin: auto;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        h2, h3 {
            text-align: center;
        }

        label {
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0 15px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="header">
    <img src="logo3.png" alt="GMRIT Logo">
    <h2>GMRIT Deemed to be University</h2>
</div>

<div class="container">

    <h2>Student Registration Form</h2>

  <form id="studentForm">

    <label>Registration Number</label>
    <input type="text" name="regno" required>

    <label>Name of Student (as per SSC)</label>
    <input type="text" name="name" required>

    <label>Gender</label>
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
    </select>

    <label>Category</label>
    <select name="category">
        <option>OC</option>
        <option>BC-A</option>
        <option>BC-B</option>
        <option>BC-C</option>
        <option>BC-D</option>
        <option>SC</option>
        <option>ST</option>
        <option>Others</option>
    </select>

    <label>Mobile Number (WhatsApp)</label>
    <input type="text" name="mobile">

    <label>Alternative Mobile Number</label>
    <input type="text" name="alt_mobile">

    <label>Email ID</label>
    <input type="email" name="email">

    <label>Permanent Address</label>
    <textarea name="address"></textarea>

    <label>Name of College</label>
    <select name="college">
        <option>Sri Chaitanya College (Srikakulam)</option>
        <option>Sri Chaitanya College (Rajam)</option>
        <option>Gnana Jyothi College (Narasannapeta)</option>
        <option>Tammi Naidu Junior College (Palakonda)</option>
        <option>Santhiniketan Junior College (Ranastalam)</option>
    </select>

    <label>SSC Marks</label>
    <input type="text" name="ssc">

    <label>Intermediate Marks</label>
    <input type="text" name="inter">

    <label>JEE Score</label>
    <input type="text" name="jee">

    <label>Status of Parents</label>
    <select name="parent_status">
        <option>Orphan</option>
        <option>Single parent</option>
        <option>Both parents alive</option>
    </select>

    <label>Father Name</label>
    <input type="text" name="father">

    <label>Father Occupation</label>
    <input type="text" name="father_occ">

    <label>Mother Name</label>
    <input type="text" name="mother">

    <label>Mother Occupation</label>
    <input type="text" name="mother_occ">

    <label>Interested B.Tech Branch</label>
    <select name="branch">
        <option>Computer Science Engineering (CSE)</option>
        <option>CSE - Artificial Intelligence and Machine Learning (AI&ML)</option>
        <option>CSE - Artificial Intelligence and Data Science (AI&DS)</option>
        <option>CSE - Information Technology (IT)</option>
	<option>CSE - Cyber Security</option>
        <option>Mechanical Engineering</option>
        <option>Civil Engineering</option>
        <option>Electrical and Electronics Engineering (EEE)</option>
        <option>Electronics and Communication Engineering (ECE)</option>
    </select>

    <button type="submit">Submit</button>

</form>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbxryPq4Bx8Y1_7eK3OjoiXcub50TuEDI1gMh57xA0iP3TYqVAr-vNoGTgxqoi0LEGz4vg/exec";

document.getElementById("studentForm").addEventListener("submit", e => {
    e.preventDefault();

    fetch(scriptURL, {
        method: "POST",
        body: new FormData(document.getElementById("studentForm"))
    })
    .then(response => {
        alert("Data submitted successfully!");
        document.getElementById("studentForm").reset();
    })
    .catch(error => alert("Error! " + error.message));
});
</script>

</body>
</html>
